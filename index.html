<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>珠宝加工厂 - 成本管理看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f6fa;
    --card-bg: #ffffff;
    --primary: #4f46e5;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    color: #fff; padding: 24px 32px; display: flex; align-items: center; gap: 16px;
  }
  .header .logo { font-size: 28px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 1px; }
  .header .sub { font-size: 13px; opacity: .7; margin-top: 2px; }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); padding: 0 32px; }
  .tab { padding: 16px 28px; cursor: pointer; font-size: 15px; font-weight: 500; color: var(--text-secondary); border-bottom: 3px solid transparent; transition: all .2s; user-select: none; }
  .tab:hover { color: var(--primary); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .module { display: none; }
  .module.active { display: block; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .summary-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
  .summary-card.income { border-left-color: var(--success); }
  .summary-card.cost { border-left-color: var(--danger); }
  .summary-card.profit { border-left-color: var(--primary); }
  .summary-card.rate { border-left-color: var(--warning); }
  .summary-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .summary-card .value { font-size: 28px; font-weight: 700; }
  .summary-card .unit { font-size: 14px; font-weight: 400; color: var(--text-secondary); }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .chart-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-wrap { position: relative; width: 100%; }
  .chart-wrap canvas { max-height: 320px; }
  .chart-wrap.tall canvas { max-height: 450px; }

  /* Form */
  .form-section { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px; }
  .form-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .form-grid.wide { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
  .form-group input {
    padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .form-row-gap { margin-top: 10px; }
  .btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn { padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .2s; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #4338ca; }
  .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  .btn-outline:hover { background: #eef2ff; }
  .btn-sm { padding: 5px 12px; font-size: 13px; border-radius: 6px; }
  .btn-edit { background: #eef2ff; color: var(--primary); border: 1px solid #c7d2fe; }
  .btn-edit:hover { background: #dbeafe; }
  .btn-del { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
  .btn-del:hover { background: #fee2e2; }

  /* Table */
  .table-wrap { overflow-x: auto; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: #f8fafc; }
  th { padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border); white-space: nowrap; font-size: 13px; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .actions { display: flex; gap: 6px; justify-content: center; }

  .progress-bar { height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .profit-positive { display: inline-block; padding: 2px 10px; border-radius: 12px; background: #ecfdf5; color: #059669; font-weight: 600; }
  .profit-negative { display: inline-block; padding: 2px 10px; border-radius: 12px; background: #fef2f2; color: #dc2626; font-weight: 600; }

  /* Tag on form */
  .form-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .form-tag.add { background: #ecfdf5; color: #059669; }
  .form-tag.edit { background: #eef2ff; color: #4f46e5; }

  /* Tooltip */
  .tip-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 17px; height: 17px; border-radius: 50%; background: #e2e8f0; color: #94a3b8;
    font-size: 11px; font-weight: 700; cursor: help; position: relative; vertical-align: middle; margin-left: 4px;
    transition: background .2s;
  }
  .tip-icon:hover { background: var(--primary); color: #fff; }
  .tip-icon .tip-text {
    visibility: hidden; opacity: 0; position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%); background: #1e293b; color: #fff; font-size: 12px; font-weight: 400;
    padding: 8px 12px; border-radius: 8px; white-space: nowrap; z-index: 100;
    pointer-events: none; transition: opacity .2s;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }
  .tip-icon .tip-text::after { content:''; position:absolute; top:100%; left:50%; margin-left:-5px; border:5px solid transparent; border-top-color:#1e293b; }
  .tip-icon:hover .tip-text { visibility: visible; opacity: 1; }

  /* Cost item row */
  .cost-items-table { width: 100%; border-collapse: collapse; }
  .cost-items-table td { padding: 6px 8px; border: none; }
  .cost-items-table input { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s; }
  .cost-items-table input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .cost-items-table .del-col { width: 40px; text-align: center; }

  /* Editable stage name */
  .stage-label { font-size:12px; color:var(--text-secondary); font-weight:500; border:1px solid transparent; background:transparent; padding:2px 4px; border-radius:4px; outline:none; width:48px; text-align:center; transition:border-color .2s,background .2s; }
  .stage-label:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 2px rgba(79,70,229,.08); }
  .stage-del { width:18px; height:18px; border-radius:50%; border:none; background:#fee2e2; color:var(--danger); cursor:pointer; font-size:11px; line-height:1; padding:0; flex-shrink:0; transition:background .15s; }
  .stage-del:hover { background:#fecaca; }

  /* Toast */
  .toast { position: fixed; top: 24px; right: 24px; z-index: 9999; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.15); transform: translateX(120%); transition: transform .3s ease; pointer-events: none; }
  .toast.show { transform: translateX(0); }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <span class="logo">💎</span>
  <div style="flex:1">
    <h1>珠宝加工厂成本管理看板</h1>
    <div class="sub">Cost Management Dashboard · 收入 / 成本 / 净利润 / 成本构成</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)" onclick="exportData()">📥 导出</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)" onclick="document.getElementById('import-file').click()">📤 导入</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-module="calculator">📊 计算成本</div>
  <div class="tab" data-module="production">🏭 生产项目</div>
  <div class="tab" data-module="salary">💰 工资管理</div>
</div>

<div class="main">

<!-- ==================== 模块一：计算成本 ==================== -->
<div class="module active" id="mod-calculator">
  <div class="form-section">
    <h3>📝 <span id="cost-form-tag" class="form-tag add">新增</span> 费用数据</h3>
    <div class="form-grid">
      <div class="form-group"><label>总收入 (¥)</label><input type="number" id="income" value="158000" step="1000"></div>
      <div class="form-group"><label>费用名称</label><input type="text" id="cost_name" placeholder="如：宝石原料"></div>
      <div class="form-group"><label>金额 (¥)</label><input type="number" id="cost_value" value="0" step="100"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="cost-btn-save" onclick="costSave()">✅ 添加费用</button>
      <button class="btn btn-outline" id="cost-btn-cancel" onclick="costCancel()" style="display:none">✕ 取消编辑</button>
      <button class="btn btn-primary" onclick="saveCalc()" style="margin-left:auto;">💾 保存并计算</button>
      <button class="btn btn-outline" onclick="resetCalcDemo()">↺ 恢复默认</button>
    </div>
  </div>
  <div class="summary-grid" id="calc-summary"></div>
  <div class="charts-row">
    <div class="chart-card"><h3>📊 成本构成占比</h3><div class="chart-wrap"><canvas id="chart-cost-breakdown"></canvas></div></div>
    <div class="chart-card"><h3>📈 收支利润对比</h3><div class="chart-wrap"><canvas id="chart-profit-bar"></canvas></div></div>
  </div>
  <div class="chart-card full"><h3>📋 成本明细表</h3><div class="table-wrap" id="cost-table"></div></div>
</div>

<!-- ==================== 模块二：生产分布 ==================== -->
<div class="module" id="mod-production">
  <!-- 增改表单 -->
  <div class="form-section">
    <h3>📝 <span id="prod-form-tag" class="form-tag add">新增</span> 品类数据</h3>
    <div class="form-grid">
      <div class="form-group"><label>客户名称</label><input type="text" id="prod_customer" placeholder="如: 周大福"></div>
      <div class="form-group"><label>品类名称</label><input type="text" id="prod_name" placeholder="如: 钻戒"></div>
      <div class="form-group"><label>产量 (件)</label><input type="number" id="prod_qty" value="0"></div>
      <div class="form-group"><label>总收入 (¥)</label><input type="number" id="prod_revenue" value="0" step="1000"></div>
    </div>
    <div class="form-grid form-row-gap" id="prod-stages-row"><!-- JS动态渲染 --></div>
    <div style="margin-top:6px">
      <button class="btn btn-outline btn-sm" onclick="prodAddStage()">＋ 添加阶段</button>
      <span style="font-size:12px;color:var(--text-secondary);margin-left:8px">最多 30 个</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="prod-btn-save" onclick="prodSave()">✅ 添加品类</button>
      <button class="btn btn-outline" id="prod-btn-cancel" onclick="prodCancel()" style="display:none">✕ 取消编辑</button>
      <button class="btn btn-outline" onclick="resetProdDemo()">↺ 恢复默认</button>
    </div>
  </div>

  <div class="summary-grid" id="prod-summary"></div>
  <div class="charts-row">
    <div class="chart-card"><h3>🏭 各品类生产成本分布</h3><div class="chart-wrap"><canvas id="chart-prod-category"></canvas></div></div>
    <div class="chart-card"><h3>📐 生产阶段成本拆分（堆叠图）</h3><div class="chart-wrap"><canvas id="chart-prod-stage"></canvas></div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>📊 各品类利润对比</h3><div class="chart-wrap"><canvas id="chart-prod-profit"></canvas></div></div>
    <div class="chart-card"><h3>👤 客户订单金额排行</h3><div class="chart-wrap tall"><canvas id="chart-prod-customer"></canvas></div></div>
  </div>
  <div class="chart-card full"><h3>📋 生产明细表</h3><div class="table-wrap" id="prod-table"></div></div>
</div>

<!-- ==================== 模块三：工资分布 ==================== -->
<div class="module" id="mod-salary">
  <div class="form-section">
    <h3>📝 <span id="salary-form-tag" class="form-tag add">新增</span> 工人数据</h3>
    <div class="form-grid">
      <div class="form-group"><label>工人姓名</label><input type="text" id="salary_name" placeholder="如: 张师傅"></div>
      <div class="form-group"><label>工序名称</label><input type="text" id="salary_process" placeholder="如: 打磨"></div>
      <div class="form-group"><label>完成件数</label><input type="number" id="salary_pieces" value="0" min="0"></div>
      <div class="form-group"><label>单件工价 (¥)</label><input type="number" id="salary_price" value="0" step="10"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="salary-btn-save" onclick="salarySave()">✅ 添加工人</button>
      <button class="btn btn-outline" id="salary-btn-cancel" onclick="salaryCancel()" style="display:none">✕ 取消编辑</button>
      <button class="btn btn-outline" onclick="resetSalaryDemo()">↺ 恢复默认</button>
    </div>
  </div>

  <div class="summary-grid" id="salary-summary"></div>
  <div class="charts-row">
    <div class="chart-card"><h3>💰 工人月工资排行</h3><div class="chart-wrap tall"><canvas id="chart-salary-wage"></canvas></div></div>
    <div class="chart-card"><h3>📦 加工件数排行</h3><div class="chart-wrap tall"><canvas id="chart-salary-pieces"></canvas></div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>🔧 工序工资分布</h3><div class="chart-wrap"><canvas id="chart-salary-process"></canvas></div></div>
    <div class="chart-card"><h3>📊 件数区间分布</h3><div class="chart-wrap"><canvas id="chart-salary-range"></canvas></div></div>
  </div>
  <div class="chart-card full"><h3>📋 工资明细表</h3><div class="table-wrap" id="salary-table"></div></div>
</div>

</div>

<script>
// ==================== 工具 ====================
function fmt(n) { return n.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtPct(n) { return n.toFixed(1) + '%'; }
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2000);
}

const COLORS = ['#4f46e5','#f43f5e','#f59e0b','#10b981','#06b6d4','#8b5cf6','#ec4899','#f97316','#14b8a6','#6366f1'];
const STORAGE_KEY = 'jewelry_cost_mgr';

// ==================== Tab 切换 ====================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
    document.getElementById('mod-' + tab.dataset.module).classList.add('active');
    if (tab.dataset.module === 'production') renderProduction();
    if (tab.dataset.module === 'salary') renderSalary();
  });
});

// ==================== 模块一：计算成本（可配置费用项） ====================
let costItems = []; // [{ name, value }]
let costIncome = 158000;

function getDefaultCostItems() {
  return [
    { name:'宝石原料', value:45000 }, { name:'贵金属原料', value:32000 },
    { name:'设计费用', value:8000 },  { name:'加工人工', value:25000 },
    { name:'设备折旧', value:5000 },  { name:'包装费用', value:3000 },
    { name:'运输物流', value:2000 },  { name:'其他费用', value:4000 },
  ];
}

function getCosts() {
  const income = costIncome;
  const items = costItems.map((c,i) => ({ key:i, label:c.name, value:c.value }));
  const totalCost = items.reduce((s,i) => s + i.value, 0);
  const netProfit = income - totalCost;
  const profitRate = income > 0 ? (netProfit / income * 100) : 0;
  return { income, items, totalCost, netProfit, profitRate };
}

// --- Cost CRUD (matching prod/salary pattern) ---
let costEditIdx = -1;

function costClearForm() {
  document.getElementById('cost_name').value = '';
  document.getElementById('cost_value').value = '0';
}
function costFillForm(idx) {
  const d = costItems[idx];
  document.getElementById('cost_name').value = d.name;
  document.getElementById('cost_value').value = d.value;
}
function costSetMode(mode, idx) {
  costEditIdx = idx;
  const isEdit = mode === 'edit';
  document.getElementById('cost-form-tag').textContent = isEdit ? '编辑' : '新增';
  document.getElementById('cost-form-tag').className = 'form-tag ' + (isEdit ? 'edit' : 'add');
  document.getElementById('cost-btn-save').textContent = isEdit ? '💾 更新费用' : '✅ 添加费用';
  document.getElementById('cost-btn-cancel').style.display = isEdit ? '' : 'none';
}

function costSave() {
  const name = document.getElementById('cost_name').value.trim();
  if (!name) { toast('请输入费用名称', 'error'); return; }
  const value = +document.getElementById('cost_value').value || 0;
  if (costEditIdx >= 0) {
    costItems[costEditIdx] = { name, value };
    toast(`已更新「${name}」`, 'success');
  } else {
    costItems.push({ name, value });
    toast(`已添加「${name}」`, 'success');
  }
  saveData();
  costCancel();
  updateCalc();
}
function costCancel() {
  costClearForm();
  costSetMode('add', -1);
}
function costEdit(idx) {
  costFillForm(idx);
  costSetMode('edit', idx);
  window.scrollTo({ top: document.getElementById('mod-calculator').offsetTop - 20, behavior: 'smooth' });
}
function costDelete(idx) {
  const name = costItems[idx].name;
  if (!confirm(`确定要删除「${name}」吗？`)) return;
  costItems.splice(idx, 1);
  if (costEditIdx === idx) costCancel();
  else if (costEditIdx > idx) costEditIdx--;
  saveData();
  updateCalc();
  toast(`已删除「${name}」`, 'success');
}

function saveCalc() {
  costIncome = +document.getElementById('income').value || 0;
  saveData();
  updateCalc();
  toast('数据已保存', 'success');
}

function resetCalcDemo() {
  costIncome = 158000;
  costItems = getDefaultCostItems();
  costCancel();
  document.getElementById('income').value = costIncome;
  saveData();
  updateCalc();
  toast('已恢复默认数据', 'success');
}

let calcCharts = {};

function updateCalc() {
  costIncome = +document.getElementById('income').value || 0;
  const d = getCosts();
  document.getElementById('calc-summary').innerHTML = `
    <div class="summary-card income">
      <div class="label">💰 总收入<span class="tip-icon">?<span class="tip-text">用户录入的总收入金额</span></span></div>
      <div class="value">¥${fmt(d.income)}</div>
    </div>
    <div class="summary-card cost">
      <div class="label">📦 总成本<span class="tip-icon">?<span class="tip-text">所有费用项目总和</span></span></div>
      <div class="value">¥${fmt(d.totalCost)}</div>
    </div>
    <div class="summary-card profit">
      <div class="label">📈 净利润<span class="tip-icon">?<span class="tip-text">总收入 − 总成本</span></span></div>
      <div class="value" style="color:${d.netProfit>=0?'var(--success)':'var(--danger)'}">¥${fmt(d.netProfit)}</div>
    </div>
    <div class="summary-card rate">
      <div class="label">📊 利润率<span class="tip-icon">?<span class="tip-text">(净利润 ÷ 总收入) × 100%</span></span></div>
      <div class="value" style="color:${d.profitRate>=0?'var(--success)':'var(--danger)'}">${fmtPct(d.profitRate)}</div>
    </div>`;

  if (calcCharts.breakdown) calcCharts.breakdown.destroy();
  const ctx1 = document.getElementById('chart-cost-breakdown').getContext('2d');
  const pieData = d.items.filter(i => i.value > 0);
  calcCharts.breakdown = new Chart(ctx1, {
    type: 'doughnut',

const DEFAULT_PROD_STAGES = ['设计', '铸造', '打磨', '镶嵌', '质检', '包装'];
let prodStages = [...DEFAULT_PROD_STAGES];
const MAX_STAGES = 30;

// Normalize all products' stage arrays to match current prodStages length
function normalizeProdStages() {
  const n = prodStages.length;
  prodList.forEach(p => {
    if (!p.stages) p.stages = [];
    while (p.stages.length < n) p.stages.push(0);
    p.stages.length = n;
  });
}

function renderProdStageForm() {
  const row = document.getElementById('prod-stages-row');
  row.innerHTML = prodStages.map((name, i) => `
    <div class="form-group">
      <div class="label-row">
        <input type="text" class="stage-label" id="prod_sname_${i}" value="${escHtml(name)}">
        ${prodStages.length > 1 ? `<button class="stage-del" onclick="prodDelStage(${i})" title="删除此阶段">×</button>` : ''}
        <span style="font-size:12px;color:var(--text-secondary)"> (¥)</span>
      </div>
      <input type="number" id="prod_s${i}" value="0">
    </div>`).join('');
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function prodAddStage() {
  if (prodStages.length >= MAX_STAGES) { toast(`最多 ${MAX_STAGES} 个阶段`, 'error'); return; }
  prodStages.push('新阶段');
  normalizeProdStages();
  renderProdStageForm();
  saveData();
}

function prodDelStage(idx) {
  if (prodStages.length <= 1) { toast('至少保留 1 个阶段', 'error'); return; }
  prodStages.splice(idx, 1);
  normalizeProdStages();
  renderProdStageForm();
  renderProduction();
  saveData();
}

function prodClearForm() {
  document.getElementById('prod_customer').value = '';
  document.getElementById('prod_name').value = '';
  document.getElementById('prod_qty').value = '0';

  for (let i = 0; i < prodStages.length; i++) {

}

  document.getElementById('prod_customer').value = d.customer || '';
  document.getElementById('prod_name').value = d.name;

  }
}

  return [
    { customer:'周大福', name:'钻戒',   qty:45, revenue:95000,  stages:[5000,12000,8000,20000,3000,2000] },
    { customer:'周大福', name:'吊坠',   qty:40, revenue:30000,  stages:[3500,6000,5000,9000,2000,1500] },
    { customer:'老凤祥', name:'项链',   qty:60, revenue:48000,  stages:[4000,8000,6000,10000,2500,1800] },
    { customer:'老凤祥', name:'手镯',   qty:35, revenue:35000,  stages:[3000,10000,7000,8000,2000,1500] },
    { customer:'六福',   name:'耳环',   qty:55, revenue:22000,  stages:[2500,5000,4000,6000,1800,1200] },
    { customer:'六福',   name:'胸针',   qty:25, revenue:12000,  stages:[2000,4000,3000,5000,1500,1000] },
  ];
}

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const d = JSON.parse(saved);
      prodList = d.prod || getDefaultProdData();
      // Migrate old prod data: if no customer field, use defaults
      if (prodList.length > 0 && !('customer' in prodList[0])) {
        prodList = getDefaultProdData();
      }
      costItems = d.costs || getDefaultCostItems();
      costIncome = d.costIncome || 158000;
      prodStages = d.prodStages || [...DEFAULT_PROD_STAGES];
      // Migrate: old salary format has 'role', new format has 'name' + 'process'
      const rawSalary = d.salary;
      if (rawSalary && rawSalary.length > 0 && rawSalary[0].name !== undefined) {
        salaryList = rawSalary;
      } else {
        salaryList = getDefaultSalaryData();
      }
      return;
    }
  } catch(e) {}
  prodList = getDefaultProdData();
  salaryList = getDefaultSalaryData();
  costItems = getDefaultCostItems();
  costIncome = 158000;
  prodStages = [...DEFAULT_PROD_STAGES];
}
function saveData() {
  for (let i = 0; i < prodStages.length; i++) {
    const inp = document.getElementById('prod_sname_'+i);
    if (inp) prodStages[i] = inp.value.trim() || DEFAULT_PROD_STAGES[i % DEFAULT_PROD_STAGES.length];
  }
  const payload = { prod: prodList, salary: salaryList, costs: costItems, costIncome, prodStages };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  return payload;
}

function exportData() {
  const payload = saveData();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `成本管理_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('数据已导出', 'success');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.prod && !data.salary && !data.costs) { toast('无效的数据文件', 'error'); return; }
      if (!confirm('导入将覆盖当前所有数据，确定继续？')) { input.value = ''; return; }
      prodList = data.prod || getDefaultProdData();
      salaryList = data.salary || getDefaultSalaryData();
      costItems = data.costs || getDefaultCostItems();
      costIncome = data.costIncome || 158000;
      prodStages = data.prodStages || [...DEFAULT_PROD_STAGES];
      normalizeProdStages();
      saveData();
      renderProdStageForm();
      document.getElementById('income').value = costIncome;
      updateCalc();
      renderProduction();
      renderSalary();
      toast('数据已导入并刷新', 'success');
    } catch(err) { toast('文件解析失败', 'error'); }
    input.value = '';
  };
  reader.readAsText(file);
}

// 切换表单模式
function prodSetMode(mode, idx) {
  prodEditingIdx = idx;
  const isEdit = mode === 'edit';
  document.getElementById('prod-form-tag').textContent = isEdit ? '编辑' : '新增';
  document.getElementById('prod-form-tag').className = 'form-tag ' + (isEdit ? 'edit' : 'add');

// 添加
function prodSave() {
  const customer = document.getElementById('prod_customer').value.trim() || '未命名客户';
  const name = document.getElementById('prod_name').value.trim();
  if (!customer || !name) { toast('请输入客户名称和品类名称', 'error'); return; }
  const qty = +document.getElementById('prod_qty').value || 0;
  const revenue = +document.getElementById('prod_revenue').value || 0;
  const stages = [];
  for (let i = 0; i < prodStages.length; i++) {
    const inp = document.getElementById('prod_s'+i);
    stages.push(inp ? (+inp.value || 0) : 0);
  }

  if (prodEditingIdx >= 0) {
    prodList[prodEditingIdx] = { customer, name, qty, revenue, stages };
    toast(`已更新「${customer} - ${name}」`, 'success');
  } else {
    prodList.push({ customer, name, qty, revenue, stages });
    toast(`已添加「${customer} - ${name}」`, 'success');
  }
  saveData();
  prodCancel();
  renderProduction();
}

function prodCancel() {
  prodClearForm();
  prodSetMode('add', -1);
}

// 编辑某行
function prodEdit(idx) {
  prodFillForm(idx);
  prodSetMode('edit', idx);
  window.scrollTo({ top: document.getElementById('mod-production').offsetTop - 20, behavior: 'smooth' });
}

// 删除某行
function prodDelete(idx) {
  const d = prodList[idx];
  if (!confirm(`确定要删除「${d.customer} - ${d.name}」吗？此操作不可撤销。`)) return;
  prodList.splice(idx, 1);
  if (prodEditingIdx === idx) prodCancel();
  else if (prodEditingIdx > idx) prodEditingIdx--;
  saveData();
  renderProduction();
  toast(`已删除「${d.customer} - ${d.name}」`, 'success');
}

function resetProdDemo() {
  prodList = getDefaultProdData();
  prodStages = [...DEFAULT_PROD_STAGES];
  normalizeProdStages();
  renderProdStageForm();
  prodCancel();
  saveData();
  renderProduction();
  toast('已恢复默认数据', 'success');
}

let prodCharts = {};

function renderProduction() {
  if (prodList.length === 0) {
    document.getElementById('prod-summary').innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">暂无数据，请通过上方表单添加品类</div>';
    document.getElementById('prod-table').innerHTML = '';
    Object.values(prodCharts).forEach(c => { try { c.destroy(); } catch(e){} });
    prodCharts = {};
    return;
  }

  const n = prodList.length;
  const customers = prodList.map(d => d.customer || '未命名');
  const categories = prodList.map(d => d.name);
  const quantities = prodList.map(d => d.qty);
  const revenues = prodList.map(d => d.revenue);
  const catLabels = prodList.map(d => (d.customer ? d.customer + '-' : '') + d.name);
  // Sync stage names from form inputs
  for (let i = 0; i < prodStages.length; i++) {
    const inp = document.getElementById('prod_sname_'+i);
    if (inp) prodStages[i] = inp.value.trim() || DEFAULT_PROD_STAGES[i % DEFAULT_PROD_STAGES.length];
  }
  const stages = prodStages;
  const matrix = prodList.map(d => (d.stages && d.stages.length === prodStages.length) ? d.stages : Array(prodStages.length).fill(0));
  const catCosts = matrix.map(row => row.reduce((a,b) => a+b, 0));
  const catProfits = prodList.map((_,i) => revenues[i] - catCosts[i]);
  const totalCost = catCosts.reduce((a,b) => a+b, 0);
  const totalRevenue = revenues.reduce((a,b) => a+b, 0);
  const totalProfit = totalRevenue - totalCost;
  const totalQty = quantities.reduce((a,b) => a+b, 0);
  // Customer aggregates
  const custMap = {};
  prodList.forEach((d, i) => {
    const c = d.customer || '未命名';
    if (!custMap[c]) custMap[c] = { revenue: 0, cost: 0, qty: 0, count: 0 };
    custMap[c].revenue += revenues[i];
    custMap[c].cost += catCosts[i];
    custMap[c].qty += quantities[i];
    custMap[c].count++;
  });
  const custNames = Object.keys(custMap);
  const totalCustomers = custNames.length;

  document.getElementById('prod-summary').innerHTML = `
    <div class="summary-card income"><div class="label">👤 客户数</div><div class="value">${totalCustomers}<span class="unit"> 个</span></div></div>
    <div class="summary-card income"><div class="label">🏭 总品类 / 总产量</div><div class="value">${n}<span class="unit"> 类 / ${totalQty} 件</span></div></div>
    <div class="summary-card cost"><div class="label">📦 生产总成本</div><div class="value">¥${fmt(totalCost)}</div></div>
    <div class="summary-card profit"><div class="label">📈 生产总利润 / 利润率</div><div class="value" style="color:${totalProfit>=0?'var(--success)':'var(--danger)'}">¥${fmt(totalProfit)}<span class="unit"> / ${fmtPct(totalRevenue>0?totalProfit/totalRevenue*100:0)}</span></div></div>`;

  // Chart 1: 品类成本分布
  if (prodCharts.cat) prodCharts.cat.destroy();
  prodCharts.cat = new Chart(document.getElementById('chart-prod-category').getContext('2d'), {
    type: 'bar', data: { labels: catLabels,
      datasets: [{ label:'总收入', data:revenues, backgroundColor:COLORS[3]+'66', borderColor:COLORS[3], borderWidth:2, borderRadius:6 },
                 { label:'总成本', data:catCosts, backgroundColor:COLORS[1]+'66', borderColor:COLORS[1], borderWidth:2, borderRadius:6 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } },
      scales:{ y:{ ticks:{ callback:v => '¥'+fmt(v) }, grid:{ color:'#f1f5f9' } }, x:{ grid:{ display:false } } } }
  });

  // Chart 2: 生产阶段堆叠
  if (prodCharts.stage) prodCharts.stage.destroy();
  prodCharts.stage = new Chart(document.getElementById('chart-prod-stage').getContext('2d'), {
    type: 'bar', data: { labels: catLabels,
      datasets: stages.map((s,i) => ({ label:s, data:matrix.map(r=>r[i]), backgroundColor:(COLORS[i%COLORS.length])+'99', borderColor:COLORS[i%COLORS.length], borderWidth:1 })) },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } },
      scales:{ x:{ stacked:true, grid:{ display:false } }, y:{ stacked:true, ticks:{ callback:v => '¥'+fmt(v) }, grid:{ color:'#f1f5f9' } } } }
  });

  // Chart 3: 各品类利润
  if (prodCharts.profit) prodCharts.profit.destroy();
  prodCharts.profit = new Chart(document.getElementById('chart-prod-profit').getContext('2d'), {
    type: 'bar', data: { labels: catLabels,
      datasets: [{ label:'净利润', data:catProfits, backgroundColor:catProfits.map(v=>v>=0?COLORS[3]+'99':COLORS[1]+'99'), borderColor:catProfits.map(v=>v>=0?COLORS[3]:COLORS[1]), borderWidth:2, borderRadius:8 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
      scales:{ y:{ ticks:{ callback:v => '¥'+fmt(v) }, grid:{ color:'#f1f5f9' } }, x:{ grid:{ display:false } } } }
  });

  // Chart 4: 客户订单金额排行 (horizontal bar)
  if (prodCharts.customer) prodCharts.customer.destroy();
  const custSorted = custNames.map(c => ({ name:c, ...custMap[c] }));
  custSorted.sort((a,b) => b.revenue - a.revenue);
  prodCharts.customer = new Chart(document.getElementById('chart-prod-customer').getContext('2d'), {
    type: 'bar',
    data: {
      labels: custSorted.map(c => c.name),
      datasets: [{
        label: '订单总额 (¥)',
        data: custSorted.map(c => c.revenue),
        backgroundColor: custSorted.map((_,i) => COLORS[i % COLORS.length] + '99'),
        borderColor: custSorted.map((_,i) => COLORS[i % COLORS.length]),
        borderWidth: 2, borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { callback: v => '¥'+fmt(v) }, grid: { color: '#f1f5f9' } },
        y: { ticks: { autoSkip: false, font:{ size:13 } }, grid: { display: false } }
      }
    }
  });

  // Table — group by customer
  const custOrder = []; // ordered list of customers
  const seen = {};
  prodList.forEach(d => { const c = d.customer || '未命名'; if (!seen[c]) { seen[c] = true; custOrder.push(c); } });
  let tableHtml = `<table><thead><tr><th>客户</th><th style="text-align:left">品类</th><th class="text-right">产量</th><th class="text-right">总收入</th><th class="text-right">总成本</th><th class="text-right">净利润</th><th class="text-right">利润率</th><th class="text-right">单件成本</th><th class="text-center">操作</th></tr></thead><tbody>`;
  custOrder.forEach(cust => {
    const rows = [];
    let custRevenue = 0, custCost = 0, custQty = 0;
    prodList.forEach((d, i) => {
      if ((d.customer || '未命名') === cust) {
        const cost = catCosts[i], profit = catProfits[i], pr = revenues[i] > 0 ? (profit/revenues[i]*100) : 0;
        const unitCost = quantities[i] > 0 ? cost/quantities[i] : 0;
        custRevenue += revenues[i]; custCost += cost; custQty += quantities[i];
        // Build NO column-1 cell; rowspan handles it
        rows.push(`<tr>
          <td style="text-align:left"><strong>${d.name}</strong></td>
          <td class="text-right">${quantities[i]} 件</td>
          <td class="text-right">¥${fmt(revenues[i])}</td>
          <td class="text-right">¥${fmt(cost)}</td>
          <td class="text-right">${profit>=0 ? '<span class="profit-positive">+¥'+fmt(profit)+'</span>' : '<span class="profit-negative">¥'+fmt(profit)+'</span>'}</td>
          <td class="text-right">${fmtPct(pr)}</td>
          <td class="text-right">¥${fmt(unitCost)}</td>
          <td class="text-center"><div class="actions"><button class="btn btn-sm btn-edit" onclick="prodEdit(${i})">✎ 编辑</button><button class="btn btn-sm btn-del" onclick="prodDelete(${i})">✕ 删除</button></div></td>
        </tr>`);
      }
    });
    const custProfit = custRevenue - custCost;
    // Prepend rowspan cell to first row only; other rows skip col 1 (covered by rowspan)
    const spanN = rows.length + 1;
    const custCell = `<td rowspan="${spanN}" style="vertical-align:top;background:#f1f5f9;font-weight:700"><strong>${cust}</strong><br><span style="font-size:12px;color:var(--text-secondary);font-weight:400">${rows.length} 品类 / ${custQty} 件</span></td>`;
    rows[0] = '<tr>' + custCell + rows[0].substring(4); // prepend rowspan to first <tr>
    tableHtml += rows.join('');
    tableHtml += `<tr style="background:#fafafa;font-size:13px"><td style="color:var(--text-secondary)"><em>小计</em></td><td class="text-right">${custQty} 件</td><td class="text-right">¥${fmt(custRevenue)}</td><td class="text-right">¥${fmt(custCost)}</td><td class="text-right">${custProfit>=0 ? '<span class="profit-positive">+¥'+fmt(custProfit)+'</span>' : '<span class="profit-negative">¥'+fmt(custProfit)+'</span>'}</td><td class="text-right">${fmtPct(custRevenue>0?custProfit/custRevenue*100:0)}</td><td class="text-right">—</td><td class="text-center">—</td></tr>`;
  });
  tableHtml += `<tr style="font-weight:700;background:#eef2ff"><td colspan="2"><strong>合计</strong></td><td class="text-right">${totalQty} 件</td><td class="text-right">¥${fmt(totalRevenue)}</td><td class="text-right">¥${fmt(totalCost)}</td><td class="text-right">${totalProfit>=0 ? '<span class="profit-positive">+¥'+fmt(totalProfit)+'</span>' : '<span class="profit-negative">¥'+fmt(totalProfit)+'</span>'}</td><td class="text-right">${fmtPct(totalRevenue>0?totalProfit/totalRevenue*100:0)}</td><td class="text-right">¥${fmt(totalQty>0?totalCost/totalQty:0)}</td><td class="text-center">—</td></tr></tbody></table>`;
  document.getElementById('prod-table').innerHTML = tableHtml;
}

    { name:'刘师傅', process:'镶嵌', pieces:50, price:140 },
    { name:'周师傅', process:'抛光', pieces:88, price:105 },
    { name:'吴师傅', process:'抛光', pieces:42, price:150 },
  ];
}

function salaryClearForm() {
  document.getElementById('salary_name').value = '';
  document.getElementById('salary_process').value = '';
  document.getElementById('salary_pieces').value = '0';
  document.getElementById('salary_price').value = '0';
}

function salaryFillForm(idx) {
  const d = salaryList[idx];
  document.getElementById('salary_name').value = d.name;
  document.getElementById('salary_process').value = d.process || '';
  document.getElementById('salary_pieces').value = d.pieces;
  document.getElementById('salary_price').value = d.price;
}

function salarySetMode(mode, idx) {
  salaryEditingIdx = idx;
  const isEdit = mode === 'edit';
  document.getElementById('salary-form-tag').textContent = isEdit ? '编辑' : '新增';
  document.getElementById('salary-form-tag').className = 'form-tag ' + (isEdit ? 'edit' : 'add');
  document.getElementById('salary-btn-save').textContent = isEdit ? '💾 更新工人' : '✅ 添加工人';
  document.getElementById('salary-btn-cancel').style.display = isEdit ? '' : 'none';
}

function salarySave() {
  const name = document.getElementById('salary_name').value.trim();
  if (!name) { toast('请输入工人姓名', 'error'); return; }
  const process = document.getElementById('salary_process').value.trim() || '未分类';
  const pieces = +document.getElementById('salary_pieces').value || 0;
  const price = +document.getElementById('salary_price').value || 0;
  if (salaryEditingIdx >= 0) {
    salaryList[salaryEditingIdx] = { name, process, pieces, price };
    toast(`已更新「${name}」`, 'success');
  } else {
    salaryList.push({ name, process, pieces, price });
    toast(`已添加「${name}」`, 'success');
  }
  saveData();
  salaryCancel();
  renderSalary();
}

function salaryCancel() {
  salaryClearForm();
  salarySetMode('add', -1);
}

function salaryEdit(idx) {
  salaryFillForm(idx);
  salarySetMode('edit', idx);
  window.scrollTo({ top: document.getElementById('mod-salary').offsetTop - 20, behavior: 'smooth' });
}

function salaryDelete(idx) {
  const name = salaryList[idx].name;
  if (!confirm(`确定要删除「${name}」吗？此操作不可撤销。`)) return;
  salaryList.splice(idx, 1);
  if (salaryEditingIdx === idx) salaryCancel();
  else if (salaryEditingIdx > idx) salaryEditingIdx--;
  saveData();
  renderSalary();
  toast(`已删除「${name}」`, 'success');
}

function resetSalaryDemo() {
  salaryList = getDefaultSalaryData();
  salaryCancel();
  saveData();
  renderSalary();
  toast('已恢复默认数据', 'success');
}

let salaryCharts = {};

function renderSalary() {
  if (salaryList.length === 0) {
    document.getElementById('salary-summary').innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">暂无数据，请通过上方表单添加工人</div>';
    document.getElementById('salary-table').innerHTML = '';
    Object.values(salaryCharts).forEach(c => { try { c.destroy(); } catch(e){} });
    salaryCharts = {};
    return;
  }

  const names = salaryList.map(d => d.name);
  const pieces = salaryList.map(d => d.pieces);
  const prices = salaryList.map(d => d.price);
  const wages = salaryList.map(d => d.pieces * d.price);
  const totalWorkers = salaryList.length;
  const totalPieces = pieces.reduce((a,b) => a+b, 0);
  const totalWage = wages.reduce((a,b) => a+b, 0);
  const avgPrice = totalPieces > 0 ? Math.round(totalWage / totalPieces) : 0;

  // Summary
  document.getElementById('salary-summary').innerHTML = `
    <div class="summary-card income"><div class="label">👥 工人总数</div><div class="value">${totalWorkers}<span class="unit"> 人</span></div></div>
    <div class="summary-card income"><div class="label">📦 总加工件数</div><div class="value">${fmt(totalPieces)}<span class="unit"> 件</span></div></div>
    <div class="summary-card cost"><div class="label">💰 月工资总额</div><div class="value">¥${fmt(totalWage)}</div></div>
    <div class="summary-card rate"><div class="label">📊 平均单件工价</div><div class="value">¥${fmt(avgPrice)}</div></div>`;

  // Sort by wage descending for bar charts
  const sorted = salaryList.map((d,i) => ({...d, wage: wages[i], idx: i}));
  sorted.sort((a,b) => b.wage - a.wage);

  // Chart 1: 工人月工资排行 (horizontal bar, sorted)
  if (salaryCharts.wage) salaryCharts.wage.destroy();
  salaryCharts.wage = new Chart(document.getElementById('chart-salary-wage').getContext('2d'), {
    type: 'bar',
    data: {
      labels: sorted.map(d => d.name),
      datasets: [{
        label: '月工资 (¥)',
        data: sorted.map(d => d.wage),
        backgroundColor: sorted.map((_,i) => COLORS[i % COLORS.length] + '99'),
        borderColor: sorted.map((_,i) => COLORS[i % COLORS.length]),
        borderWidth: 2,
        borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { left: 10, right: 20 } },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { callback: v => '¥'+fmt(v) }, grid: { color: '#f1f5f9' } },
        y: { grid: { display: false }, ticks: { font: { size: 13 }, padding: 4, autoSkip: false } }
      }
    }
  });

  // Chart 2: 加工件数排行 (horizontal bar, sorted by pieces)
  const sortedByPieces = [...salaryList].map((d,i) => ({...d, idx:i}));
  sortedByPieces.sort((a,b) => b.pieces - a.pieces);
  if (salaryCharts.pieces) salaryCharts.pieces.destroy();
  salaryCharts.pieces = new Chart(document.getElementById('chart-salary-pieces').getContext('2d'), {
    type: 'bar',
    data: {
      labels: sortedByPieces.map(d => d.name),
      datasets: [{
        label: '完成件数',
        data: sortedByPieces.map(d => d.pieces),
        backgroundColor: sortedByPieces.map((_,i) => COLORS[i % COLORS.length] + '99'),
        borderColor: sortedByPieces.map((_,i) => COLORS[i % COLORS.length]),
        borderWidth: 2,
        borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { left: 10, right: 20 } },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { callback: v => fmt(v)+'件' }, grid: { color: '#f1f5f9' } },
        y: { grid: { display: false }, ticks: { font: { size: 13 }, padding: 4, autoSkip: false } }
      }
    }
  });

  // Chart 3: 工序工资分布 (doughnut)
  if (salaryCharts.process) salaryCharts.process.destroy();
  const procMap = {};
  salaryList.forEach(d => {
    const p = d.process || '未分类';
    if (!procMap[p]) procMap[p] = { wage: 0, pieces: 0 };
    procMap[p].wage += d.pieces * d.price;
    procMap[p].pieces += d.pieces;
  });
  const procNames = Object.keys(procMap);
  salaryCharts.process = new Chart(document.getElementById('chart-salary-process').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: procNames,
      datasets: [{
        data: procNames.map(p => procMap[p].wage),
        backgroundColor: COLORS.slice(0, procNames.length).map(c => c + '99'),
        borderColor: COLORS.slice(0, procNames.length),
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { padding: 12, usePointStyle: true, font: { size: 12 } } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ¥${fmt(ctx.raw)} (${fmtPct(ctx.raw/totalWage*100)}) — ${fmt(procMap[ctx.label].pieces)}件` } }
      }
    }
  });

  // Chart 4: 件数区间分布 (doughnut)
  if (salaryCharts.range) salaryCharts.range.destroy();
  const bins = [
    { label: '0-40 件', min: 0, max: 40 },
    { label: '41-60 件', min: 41, max: 60 },
    { label: '61-80 件', min: 61, max: 80 },
    { label: '81-100 件', min: 81, max: 100 },
    { label: '100+ 件', min: 101, max: Infinity }
  ];
  const binCounts = bins.map(b => salaryList.filter(d => d.pieces >= b.min && d.pieces <= b.max).length);
  salaryCharts.range = new Chart(document.getElementById('chart-salary-range').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: bins.map(b => b.label),
      datasets: [{
        data: binCounts,
        backgroundColor: [COLORS[0]+'99', COLORS[2]+'99', COLORS[3]+'99', COLORS[5]+'99', COLORS[8]+'99'],
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { padding: 12, usePointStyle: true, font: { size: 12 } } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} 人 (${fmtPct(ctx.raw/totalWorkers*100)})` } }
      }
    }
  });

  // Table — group by process (no rowspan, consistent column count)
  let tableHtml = `<table><thead><tr><th>工序</th><th>工人</th><th class="text-right">完成件数</th><th class="text-right">单件工价</th><th class="text-right">月工资</th><th class="text-center">操作</th></tr></thead><tbody>`;
  const procOrder = [];
  const seenProc = {};
  salaryList.forEach(d => { const p = d.process || '未分类'; if (!seenProc[p]) { seenProc[p] = true; procOrder.push(p); } });
  procOrder.forEach(proc => {
    const rows = [];
    let procPieces = 0, procWage = 0;
    salaryList.forEach((d, i) => {
      if ((d.process || '未分类') === proc) {
        const wage = d.pieces * d.price;
        procPieces += d.pieces; procWage += wage;
        rows.push(`<tr>
          <td style="text-align:left"><strong>${d.name}</strong></td>
          <td class="text-right">${fmt(d.pieces)} 件</td>
          <td class="text-right">¥${fmt(d.price)}</td>
          <td class="text-right"><strong>¥${fmt(wage)}</strong></td>
          <td class="text-center"><div class="actions"><button class="btn btn-sm btn-edit" onclick="salaryEdit(${i})">✎ 编辑</button><button class="btn btn-sm btn-del" onclick="salaryDelete(${i})">✕ 删除</button></div></td>
        </tr>`);
      }
    });
    const spanN = rows.length + 1;
    const procCell = `<td rowspan="${spanN}" style="vertical-align:top;background:#f1f5f9;font-weight:700">${proc}<br><span style="font-size:12px;color:var(--text-secondary);font-weight:400">${rows.length} 人</span></td>`;
    rows[0] = '<tr>' + procCell + rows[0].substring(4);
    tableHtml += rows.join('');
    tableHtml += `<tr style="background:#fafafa;font-size:13px"><td style="color:var(--text-secondary)"><em>小计</em></td><td class="text-right">${fmt(procPieces)} 件</td><td class="text-right">—</td><td class="text-right">¥${fmt(procWage)}</td><td class="text-center">—</td></tr>`;
  });
  tableHtml += `<tr style="font-weight:700;background:#eef2ff"><td colspan="2"><strong>合计</strong></td><td class="text-right">${fmt(totalPieces)} 件</td><td class="text-right">¥${fmt(avgPrice)}</td><td class="text-right">¥${fmt(totalWage)}</td><td class="text-center">—</td></tr></tbody></table>`;
  document.getElementById('salary-table').innerHTML = tableHtml;
}

// ==================== 初始化 ====================
loadData();
document.getElementById('income').value = costIncome;
renderProdStageForm();
normalizeProdStages();
updateCalc();
renderProduction();
renderSalary();
</script>
